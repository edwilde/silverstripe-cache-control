# Example project-level cache control configuration
# Copy this to your project's app/_config/ directory and customize as needed

---
Name: myproject-cache-controls
After:
  - '#cache-controls'
---

# Example 1: Enable site-wide caching with 5-minute cache (300 seconds)
# This sets default values for all sites
Edwilde\CacheControls\Extensions\CacheControlSiteConfigExtension:
  defaults:
    EnableCacheControl: true
    CacheType: 'public'
    CacheDuration: 'maxage'
    MaxAge: 300
    EnableMustRevalidate: true

# Example 2: Disable page-level overrides completely
# Uncomment this to remove the Cache Control tab from pages
# SilverStripe\CMS\Model\SiteTree:
#   allow_page_override: false

---
# Alternative Example: More aggressive caching (1 hour, public)
# Uncomment and modify based on your needs
---
# Edwilde\CacheControls\Extensions\CacheControlSiteConfigExtension:
#   defaults:
#     EnableCacheControl: true
#     CacheType: 'public'
#     CacheDuration: 'maxage'
#     MaxAge: 3600
#     EnableMustRevalidate: true

---
# Alternative Example: Conservative caching (1 minute, private)
# Good for frequently updated or user-specific content
---
# Edwilde\CacheControls\Extensions\CacheControlSiteConfigExtension:
#   defaults:
#     EnableCacheControl: true
#     CacheType: 'private'
#     CacheDuration: 'maxage'
