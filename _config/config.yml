---
Name: edwilde-cache-controls
After:
  - '#nswdpc-cache-headers'
---
# Apply extensions for CMS configuration
SilverStripe\SiteConfig\SiteConfig:
  extensions:
    - Edwilde\CacheControls\Extensions\CacheControlSiteConfigExtension

SilverStripe\CMS\Model\SiteTree:
  extensions:
    - Edwilde\CacheControls\Extensions\CacheControlPageExtension

# Apply our controller extension to apply CMS settings
SilverStripe\CMS\Controllers\ContentController:
  extensions:
    - Edwilde\CacheControls\Extensions\CacheControlContentControllerExtension

# Use nswdpc's middleware and configuration
# By default, caching is disabled (state: 'enabled' with no directives set)
# CMS users can enable and configure via SiteConfig
NSWDPC\Utilities\Cache\CacheHeaderConfiguration:
  state: 'enabled'
  # These will be set dynamically by our controller extension based on CMS settings
  max_age: null
  s_max_age: null
  vary: null
  no_store: null
  must_revalidate: null
  no_cache: null
