---
Name: edwilde-cache-control
After:
  - '#nswdpc-cache-headers'
---
# Apply extensions for CMS configuration
SilverStripe\SiteConfig\SiteConfig:
  extensions:
    - Edwilde\CacheControl\Extensions\CacheControlSiteConfigExtension

SilverStripe\CMS\Model\SiteTree:
  extensions:
    - Edwilde\CacheControl\Extensions\CacheControlPageExtension
  # Cache inheritance allows child pages to inherit cache settings from a parent page.
  # When enabled, editors can check "Apply to child pages" on a parent page and all
  # descendant pages will use that parent's cache settings (unless they have their own override).
  # Disabled by default because it adds database queries per request to walk the page tree.
  # Enable in your project's YAML config if you need section-level cache overrides.
  enable_cache_inheritance: false
  # When a page has unpublished draft changes, reduce max-age to this value (seconds).
  # Controlled by the EnableDraftCacheReduction checkbox in SiteConfig.
  draft_cache_max_age: 10

# Apply our controller extension to apply CMS settings
SilverStripe\CMS\Controllers\ContentController:
  extensions:
    - Edwilde\CacheControl\Extensions\CacheControlContentControllerExtension
    - Edwilde\CacheControl\Extensions\DevCacheBypassExtension

# Use nswdpc's middleware and configuration
# By default, caching is disabled (state: 'enabled' with no directives set)
# CMS users can enable and configure via SiteConfig
NSWDPC\Utilities\Cache\CacheHeaderConfiguration:
  state: 'enabled'
  # These will be set dynamically by our controller extension based on CMS settings
  max_age: null
  s_max_age: null
  vary: null
  no_store: null
  must_revalidate: null
  no_cache: null
